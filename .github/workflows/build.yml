name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-go:
    strategy:
      matrix:
        platform: [ ubuntu-latest ]
    runs-on: ${{ matrix.platform }}
    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # Set up Go environment
      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: '1.24.0'  # Specify the Go version you want to use

      # Cache Go modules
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Install dependencies
      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      # Install golangci-lint
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5

      # Check Go code formatting
      - name: Check code format
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted. Run 'go fmt ./...' locally."
            exit 1
          fi

      # Lint Go sources
      - name: Lint Go sources
        run: golangci-lint run ./...

      # Run Go tests
      - name: Run Go tests
        run: go test -v ./...

      # Build Go binary
      - name: Build Go binary
        run: go build -v ./...

  build-assets:
    needs: build-go  # 依赖 build-go，确保代码检查通过
    if: startsWith(github.ref, 'refs/tags/')  # 仅在 Tag 推送时运行
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        include:
          - os: ubuntu-latest
            target: linux
            ext: ""
          - os: windows-latest
            target: windows
            ext: ".exe"
          - os: macos-latest
            target: darwin
            ext: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"

      - name: Build executable
        run: |
          GOOS=${{ matrix.target }} GOARCH=amd64 go build -o gogen-${{ matrix.target }}${{ matrix.ext }} -ldflags "-X main.GitCommit=$(git rev-parse --short HEAD)" .
          if [ "${{ matrix.os }}" != "windows-latest" ]; then chmod +x gogen-${{ matrix.target }}${{ matrix.ext }}; fi
        shell: bash

      - name: Check permissions
        run: ls -l gogen-${{ matrix.target }}${{ matrix.ext }} || dir gogen-${{ matrix.target }}${{ matrix.ext }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gogen-${{ matrix.target }}
          path: gogen-${{ matrix.target }}${{ matrix.ext }}

  release:
    needs: build-assets  # 依赖 build-assets，确保可执行文件生成
    if: startsWith(github.ref, 'refs/tags/')  # 仅在 Tag 推送时运行
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Check downloaded artifact permissions
        run: |
          ls -l artifacts/gogen-linux/gogen-linux
          ls -l artifacts/gogen-darwin/gogen-darwin
          ls -l artifacts/gogen-windows/gogen-windows.exe || echo "Windows file"
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ github.workspace }}/CHANGELOG.md
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            artifacts/gogen-linux/gogen-linux
            artifacts/gogen-windows/gogen-windows.exe
            artifacts/gogen-darwin/gogen-darwin
